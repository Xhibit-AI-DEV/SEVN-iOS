<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>SEVN - Choose Your Experience</title>
  
  <!-- CRITICAL: Block all external font loading via CSP -->
  <meta http-equiv="Content-Security-Policy" content="font-src 'self' data: blob:;">
  
  <!-- COMPREHENSIVE SF-Pro Font Blocker - Layer 1: Preload Blocking -->
  <script>
    // Comprehensive font loading blocker
    (function() {
      'use strict';
      
      // Auto-redirect to customer.html if running in Capacitor (mobile app)
      // Check immediately and also after a short delay to ensure Capacitor loads
      function checkAndRedirect() {
        if (typeof window.Capacitor !== 'undefined') {
          window.location.href = '/customer.html';
          return true;
        }
        return false;
      }
      
      if (!checkAndRedirect()) {
        // If not found immediately, check after a short delay
        setTimeout(checkAndRedirect, 50);
      }
      
      // Global error suppression - MOST AGGRESSIVE
      window.addEventListener('error', function(e) {
        if (e.message && (
            e.message.includes('static.figma.com/font') ||
            e.message.includes('SF-Pro') ||
            e.message.includes('Failed to fetch URL: https://static.figma.com')
        )) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
      
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.toString && (
            e.reason.toString().includes('static.figma.com/font') ||
            e.reason.toString().includes('SF-Pro') ||
            e.reason.toString().includes('Failed to fetch URL: https://static.figma.com')
        )) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
      
      // Intercept fetch API
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        const url = args[0];
        if (typeof url === 'string' && url.includes('static.figma.com/font')) {
          return Promise.resolve(new Response('', { status: 200 }));
        }
        return originalFetch.apply(this, args);
      };

      // Intercept XMLHttpRequest
      const OriginalXHR = window.XMLHttpRequest;
      window.XMLHttpRequest = function() {
        const xhr = new OriginalXHR();
        const originalOpen = xhr.open;
        xhr.open = function(method, url, ...rest) {
          if (typeof url === 'string' && url.includes('static.figma.com/font')) {
            return;
          }
          return originalOpen.apply(this, [method, url, ...rest]);
        };
        return xhr;
      };
      
      // Override FontFace constructor
      if (window.FontFace) {
        const OriginalFontFace = window.FontFace;
        window.FontFace = function(family, source, descriptors) {
          if (typeof source === 'string' && source.includes('static.figma.com')) {
            return new OriginalFontFace(family, 'local("Helvetica Neue")', descriptors);
          }
          return new OriginalFontFace(family, source, descriptors);
        };
      }

      // Suppress console errors about font loading
      const originalError = console.error;
      console.error = function(...args) {
        const errorMsg = args.join(' ');
        if (errorMsg.includes('static.figma.com/font') || 
            errorMsg.includes('SF-Pro') || 
            errorMsg.includes('Failed to fetch URL: https://static.figma.com')) {
          return;
        }
        return originalError.apply(this, args);
      };
      
      const originalWarn = console.warn;
      console.warn = function(...args) {
        const warnMsg = args.join(' ');
        if (warnMsg.includes('static.figma.com/font') || 
            warnMsg.includes('SF-Pro') || 
            warnMsg.includes('Failed to fetch URL: https://static.figma.com')) {
          return;
        }
        return originalWarn.apply(this, args);
      };

      // LAYER 2: MutationObserver to remove dynamically injected font styles
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.tagName === 'STYLE' || node.tagName === 'LINK') {
              const content = node.textContent || node.href || '';
              if (content.includes('static.figma.com/font')) {
                node.remove();
              }
            }
          });
        });
      });

      // Start observing when DOM is ready
      if (document.head) {
        observer.observe(document.head, { childList: true, subtree: true });
      }
      document.addEventListener('DOMContentLoaded', () => {
        observer.observe(document.head, { childList: true, subtree: true });
        observer.observe(document.body, { childList: true, subtree: true });
      });
    })();
  </script>
  
  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #f5f5f5;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
    }
    
    /* Critical font-face definitions to prevent external font loading */
    @font-face {
      font-family: 'SF-Pro_1';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    @font-face {
      font-family: 'SF_Pro';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    @font-face {
      font-family: 'SF Pro';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    
    .container {
      text-align: center;
      max-width: 600px;
      padding: 40px;
    }
    h1 {
      font-size: 32px;
      margin-bottom: 40px;
      letter-spacing: 0.3em;
    }
    .buttons {
      display: flex;
      gap: 20px;
      flex-direction: column;
    }
    a {
      display: block;
      padding: 20px 40px;
      background: black;
      color: white;
      text-decoration: none;
      border-radius: 8px;
      font-size: 18px;
      transition: background 0.2s;
    }
    a:hover {
      background: #333;
    }
    .subtitle {
      font-size: 14px;
      color: #666;
      margin-top: 8px;
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>SEVN SELECTS</h1>
    <div class="buttons">
      <div>
        <a href="/customer.html">Customer Experience (sevn.app/lissy)</a>
        <p class="subtitle">Landing page, intake form, waitlist</p>
      </div>
      <div>
        <a href="/admin.html">Admin Interface</a>
        <p class="subtitle">Stylist workspace, customer management</p>
      </div>
    </div>
  </div>
</body>
</html>
