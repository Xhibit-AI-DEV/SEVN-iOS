<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
  
  <!-- CRITICAL: Block all external font loading via CSP -->
  <meta http-equiv="Content-Security-Policy" content="font-src 'self' data: blob:;">
  
  <title>SEVN SELECTS</title>
  <style>
    /* CRITICAL: Define ALL font-face rules FIRST before any scripts */
    @font-face {
      font-family: 'SF-Pro_1';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-weight: normal;
      font-style: normal;
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    @font-face {
      font-family: 'SF Pro';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-weight: normal;
      font-style: normal;
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    @font-face {
      font-family: 'SF_Pro';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-weight: normal;
      font-style: normal;
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    @font-face {
      font-family: 'SF_Pro:Semibold';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-weight: 600;
      font-style: normal;
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    @font-face {
      font-family: 'SF_Pro:Regular';
      src: local('Helvetica Neue'), local('Helvetica'), local('Arial');
      font-weight: 400;
      font-style: normal;
      font-display: block;
      unicode-range: U+0000-10FFFF;
    }
    
    /* Prevent font loading errors - comprehensive font-face definitions */
    html {
      /* Support safe areas for iOS notch */
      height: 100%;
      overflow: hidden;
    }
    
    body {
      margin: 0;
      padding: 0;
      font-family: "Helvetica Neue", Helvetica, Arial, -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', 'Fira Sans', 'Droid Sans', sans-serif;
      -webkit-font-smoothing: antialiased;
      -moz-osx-font-smoothing: grayscale;
      width: 100%;
      height: 100%;
      overflow: hidden;
      /* Critical for iOS safe area */
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
    
    /* CRITICAL: iOS-specific fixes to prevent zoom and viewport issues */
    * {
      -webkit-text-size-adjust: 100%;
      touch-action: pan-y pan-x;
    }
    
    input, textarea, select {
      font-size: 16px !important; /* Prevents iOS zoom on focus */
    }
    
    #root {
      width: 100%;
      height: 100%;
      overflow: hidden;
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      bottom: 0;
    }
  </style>
  <script>
    // Comprehensive font loading blocker + iOS Crash Prevention
    (function() {
      // 🛡️ iOS WebKit Crash Prevention
      // Monitor memory usage and throttle image loading
      let imageLoadCount = 0;
      const MAX_CONCURRENT_IMAGES = 5;
      
      // Override Image constructor to throttle loading
      const OriginalImage = window.Image;
      window.Image = function() {
        const img = new OriginalImage();
        const originalSrc = Object.getOwnPropertyDescriptor(OriginalImage.prototype, 'src');
        
        Object.defineProperty(img, 'src', {
          get: function() {
            return originalSrc.get.call(this);
          },
          set: function(value) {
            // Throttle image loading
            if (imageLoadCount >= MAX_CONCURRENT_IMAGES) {
              console.log('⏳ Throttling image load:', value.substring(0, 50));
              setTimeout(() => {
                originalSrc.set.call(this, value);
                imageLoadCount++;
              }, 100);
            } else {
              originalSrc.set.call(this, value);
              imageLoadCount++;
            }
            
            // Decrement counter when image loads
            this.addEventListener('load', () => {
              imageLoadCount = Math.max(0, imageLoadCount - 1);
            });
            this.addEventListener('error', () => {
              imageLoadCount = Math.max(0, imageLoadCount - 1);
            });
          }
        });
        
        return img;
      };
      
      // LAYER 0: Global error suppression - MOST AGGRESSIVE
      window.addEventListener('error', function(e) {
        if (e.message && (
            e.message.includes('static.figma.com/font') ||
            e.message.includes('SF-Pro') ||
            e.message.includes('Failed to fetch URL: https://static.figma.com')
        )) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
      
      window.addEventListener('unhandledrejection', function(e) {
        if (e.reason && e.reason.toString && (
            e.reason.toString().includes('static.figma.com/font') ||
            e.reason.toString().includes('SF-Pro') ||
            e.reason.toString().includes('Failed to fetch URL: https://static.figma.com')
        )) {
          e.stopImmediatePropagation();
          e.preventDefault();
          return false;
        }
      }, true);
      
      // 1. Override fetch to block Figma CDN font requests
      const originalFetch = window.fetch;
      window.fetch = function(...args) {
        const url = args[0];
        if (typeof url === 'string' && url.includes('static.figma.com/font')) {
          console.warn('[BLOCKED] Figma font fetch prevented:', url);
          return Promise.reject(new Error('Figma font loading blocked'));
        }
        return originalFetch.apply(this, args);
      };

      // 2. Override XMLHttpRequest to block Figma CDN font requests
      const OriginalXHR = window.XMLHttpRequest;
      window.XMLHttpRequest = function() {
        const xhr = new OriginalXHR();
        const originalOpen = xhr.open;
        xhr.open = function(method, url, ...rest) {
          if (typeof url === 'string' && url.includes('static.figma.com/font')) {
            console.warn('[BLOCKED] XHR Figma font request prevented:', url);
            return;
          }
          return originalOpen.apply(this, [method, url, ...rest]);
        };
        return xhr;
      };

      // 3. Override FontFace constructor
      if (window.FontFace) {
        const OriginalFontFace = window.FontFace;
        window.FontFace = function(family, source, descriptors) {
          if (typeof source === 'string' && source.includes('static.figma.com')) {
            console.warn('[BLOCKED] FontFace Figma font prevented:', family, source);
            return new OriginalFontFace(family, 'local("SF Pro Display")', descriptors);
          }
          return new OriginalFontFace(family, source, descriptors);
        };
      }
      
      // 4. Suppress console errors related to Figma fonts
      const originalError = console.error;
      console.error = function(...args) {
        const errorMsg = args.join(' ');
        if (errorMsg.includes('static.figma.com/font') || 
            errorMsg.includes('SF-Pro') || 
            errorMsg.includes('Failed to fetch URL: https://static.figma.com')) {
          return;
        }
        originalError.apply(console, args);
      };
      
      // Also suppress warnings
      const originalWarn = console.warn;
      console.warn = function(...args) {
        const warnMsg = args.join(' ');
        if (warnMsg.includes('static.figma.com/font') || 
            warnMsg.includes('SF-Pro') || 
            warnMsg.includes('Failed to fetch URL: https://static.figma.com')) {
          return;
        }
        originalWarn.apply(console, args);
      };
      
      // 5. Monitor and block dynamic stylesheet additions
      const observer = new MutationObserver((mutations) => {
        mutations.forEach((mutation) => {
          mutation.addedNodes.forEach((node) => {
            if (node.tagName === 'STYLE' || node.tagName === 'LINK') {
              const content = node.textContent || node.href || '';
              if (content.includes('static.figma.com/font')) {
                console.warn('[BLOCKED] Dynamic Figma font style removed');
                node.remove();
              }
            }
          });
        });
      });
      observer.observe(document.documentElement, { childList: true, subtree: true });
    })();
  </script>
</head>
<body>
  <div id="root"></div>
  <script type="module">
    import { createRoot } from 'react-dom/client';
    import CustomerApp from './CustomerApp.tsx';
    
    const root = createRoot(document.getElementById('root'));
    root.render(<CustomerApp />);
  </script>
</body>
</html>
